<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THUNDER_FACTOR // TERMINAL</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #001100; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const styles = {
            container: {
                backgroundColor: '#001100',
                color: '#33ff33',
                fontFamily: '"Courier New", Courier, monospace',
                padding: '20px',
                minHeight: '100vh',
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                textShadow: '0 0 5px #33ff33, 0 0 10px #11aa11',
                position: 'relative',
                overflow: 'hidden',
                boxSizing: 'border-box'
            },
            scanlines: {
                position: 'absolute',
                top: 0, left: 0, width: '100%', height: '100%',
                background: 'linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%)',
                backgroundSize: '100% 4px',
                zIndex: 10,
                pointerEvents: 'none',
            },
            header: {
                textAlign: 'center',
                borderBottom: '2px double #33ff33',
                paddingBottom: '10px',
                marginBottom: '20px',
                width: '100%',
                maxWidth: '500px',
            },
            dashboard: {
                display: 'flex',
                justifyContent: 'space-between',
                width: '100%',
                maxWidth: '500px',
                marginBottom: '20px',
                fontSize: '1.2rem',
            },
            grid: {
                display: 'grid',
                gridTemplateColumns: 'repeat(5, 1fr)',
                gap: '10px',
                width: '100%',
                maxWidth: '400px',
                backgroundColor: '#002200',
                padding: '15px',
                border: '3px solid #33ff33',
                boxShadow: 'inset 0 0 15px #001100, 0 0 15px #33ff33',
                borderRadius: '4px',
            },
            tile: {
                aspectRatio: '1',
                backgroundColor: '#001100',
                border: '1px solid #33ff33',
                display: 'flex',
                justifyContent: 'center',
                alignItems: 'center',
                fontSize: '1.4rem',
                fontWeight: 'bold',
                cursor: 'pointer',
                userSelect: 'none',
                transition: 'all 0.1s ease',
            },
            selectedTile: {
                backgroundColor: '#33ff33',
                color: '#001100',
                textShadow: 'none',
                boxShadow: '0 0 10px #33ff33',
            },
            button: {
                backgroundColor: 'transparent',
                color: '#33ff33',
                border: '2px solid #33ff33',
                padding: '10px 20px',
                fontSize: '1rem',
                fontFamily: '"Courier New", Courier, monospace',
                cursor: 'pointer',
                marginTop: '20px',
                textShadow: '0 0 5px #33ff33',
                boxShadow: '0 0 5px #33ff33',
            },
            shareBox: {
                marginTop: '20px',
                padding: '15px',
                border: '1px dashed #33ff33',
                width: '100%',
                maxWidth: '400px',
                textAlign: 'center',
                backgroundColor: '#001800',
                boxSizing: 'border-box'
            }
        };

        function ThunderFactor() {
            const [grid, setGrid] = useState([]);
            const [targetFactor, setTargetFactor] = useState(7);
            const [score, setScore] = useState(0);
            const [selectedIndices, setSelectedIndices] = useState([]);
            const [maxChain, setMaxChain] = useState(0);

            const generateGrid = () => {
                const initialGrid = Array.from({ length: 25 }, () => Math.floor(Math.random() * 90) + 10);
                setGrid(initialGrid);
                setSelectedIndices([]);
                setScore(0);
                setMaxChain(0);
                const factors = [3, 4, 6, 7, 8, 9];
                setTargetFactor(factors[Math.floor(Math.random() * factors.length)]);
            };

            useEffect(() => {
                generateGrid();
            }, []);

            const getRow = (index) => Math.floor(index / 5);
            const getCol = (index) => index % 5;

            const isAdjacent = (indexA, indexB) => {
                const rowA = getRow(indexA);
                const colA = getCol(indexA);
                const rowB = getRow(indexB);
                const colB = getCol(indexB);
                return Math.abs(rowA - rowB) <= 1 && Math.abs(colA - colB) <= 1;
            };

            const handleTileClick = (index) => {
                if (selectedIndices.includes(index)) return;
                const value = grid[index];

                if (value % targetFactor !== 0) {
                    alert(`SYSTEM ERROR: ${value} IS NOT DIVISIBLE BY ${targetFactor}! MATRIX RESET.`);
                    setSelectedIndices([]);
                    return;
                }

                if (selectedIndices.length > 0) {
                    const lastSelectedIndex = selectedIndices[selectedIndices.length - 1];
                    if (!isAdjacent(lastSelectedIndex, index)) {
                        alert("VECTOR DISCONNECTED: SELECTED CHORD MUST BE ADJACENT.");
                        setSelectedIndices([]);
                        return;
                    }
                }
                setSelectedIndices([...selectedIndices, index]);
            };

            const processSlice = () => {
                if (selectedIndices.length === 0) return;
                const chainLength = selectedIndices.length;
                setScore(prev => prev + (chainLength * 100 * chainLength));
                if (chainLength > maxChain) setMaxChain(chainLength);

                const newGrid = [...grid];
                selectedIndices.forEach(index => {
                    newGrid[index] = Math.floor(Math.random() * 90) + 10;
                });
                setGrid(newGrid);
                setSelectedIndices([]);
            };

            return (
                <div style={styles.container}>
                    <div style={styles.scanlines} />
                    <header style={styles.header}>
                        <h1>⚡ THUNDER_FACTOR // V1.1.0 ⚡</h1>
                        <p>TRACE SEQUENTIAL SQUARES // ADJACENT LINKS ONLY</p>
                    </header>

                    <div style={styles.dashboard}>
                        <div>TARGET: <span style={{fontSize: '1.5rem', color: '#fff'}}>{targetFactor}</span></div>
                        <div>CHAIN: x{selectedIndices.length}</div>
                        <div>SCORE: {score}</div>
                    </div>

                    <div style={styles.grid}>
                        {grid.map((value, index) => {
                            const isSelected = selectedIndices.includes(index);
                            return (
                                <div
                                    key={index}
                                    onClick={() => handleTileClick(index)}
                                    style={{ ...styles.tile, ...(isSelected ? styles.selectedTile : {}) }}
                                >
                                    {value}
                                </div>
                            );
                        })}
                    </div>

                    <div style={{ display: 'flex', gap: '20px' }}>
                        <button style={styles.button} onClick={processSlice} disabled={selectedIndices.length === 0}>
                            EXECUTE SLICE [_ENTER]
                        </button>
                        <button style={styles.button} onClick={generateGrid}>
                            RESET BOARD
                        </button>
                    </div>
                </div>
            );
        }

        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ThunderFactor />);
    </script>
</body>
</html>
